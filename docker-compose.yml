# ContentForge Tech - Docker Compose
# 一键部署Streamlit应用
# 用法: docker-compose up -d

version: "3.8"

services:
  contentforge:
    build:
      context: .
      dockerfile: Dockerfile
    image: contentforge-tech:latest
    container_name: contentforge-tech
    restart: unless-stopped

    # 端口映射: 宿主8501 -> 容器8501
    ports:
      - "8501:8501"

    # 环境变量
    environment:
      # 从宿主环境变量读取，或在.env文件中定义
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEFAULT_AI_MODEL=${DEFAULT_AI_MODEL:-claude}

    # 可选：挂载本地目录用于持久化
    # volumes:
    #   - ./data:/app/data

    # 资源限制（根据服务器配置调整）
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

    # 健康检查
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

